<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-container">
    <div class="login-card">
      <header>
        <h1 class="header">Reset Your Password</h1>
      </header>

      <div class="page">
        <form id="resetPasswordForm">
          <input type="text" id="resetEmail" placeholder="Rowan Email" readonly>
          <input type="text" id="resetToken" placeholder="Reset Token" readonly>
          <input type="password" id="newPassword" placeholder="Enter New Password" required>
          <input type="password" id="confirmPassword" placeholder="Confirm New Password" required>

          <p id="passwordRequirements" class="error" style="display:none;">
            Password must be at least 8 characters and include 1 uppercase letter, 1 lowercase letter, 1 number, and 1 special character.
          </p>

          <div class="form-buttons">
            <button type="submit">Reset Password</button>
            <button type="button" id="backToLoginBtn">Back to Login</button>
          </div>
        </form>

        <p id="resetMessage" class="error"></p>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);

    const resetEmail = document.getElementById("resetEmail");
    const resetToken = document.getElementById("resetToken");
    const newPassword = document.getElementById("newPassword");
    const confirmPassword = document.getElementById("confirmPassword");
    const passwordRequirements = document.getElementById("passwordRequirements");
    const resetMessage = document.getElementById("resetMessage");
    const resetPasswordForm = document.getElementById("resetPasswordForm");
    const backToLoginBtn = document.getElementById("backToLoginBtn");

    resetEmail.value = params.get("email") || "";
    resetToken.value = params.get("token") || "";

    function validatePassword(password) {
      const minLength = password.length >= 8;
      const hasUpper = /[A-Z]/.test(password);
      const hasLower = /[a-z]/.test(password);
      const hasNumber = /[0-9]/.test(password);
      const hasSpecial = /[^A-Za-z0-9]/.test(password);
      return minLength && hasUpper && hasLower && hasNumber && hasSpecial;
    }

    function updatePasswordHint() {
      const password = newPassword.value;

      if (!password) {
        passwordRequirements.style.display = "none";
        return;
      }

      passwordRequirements.style.display = validatePassword(password) ? "none" : "block";
    }

    newPassword.addEventListener("input", updatePasswordHint);

    resetPasswordForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = resetEmail.value.trim().toLowerCase();
      const token = resetToken.value.trim();
      const password = newPassword.value;
      const confirm = confirmPassword.value;

      resetMessage.style.color = "#c62828";
      resetMessage.textContent = "";

      if (!email || !token || !password || !confirm) {
        resetMessage.textContent = "All fields are required.";
        return;
      }

      if (!validatePassword(password)) {
        passwordRequirements.style.display = "block";
        resetMessage.textContent = "Password does not meet the requirements.";
        return;
      }

      if (password !== confirm) {
        resetMessage.textContent = "Passwords do not match.";
        return;
      }

      try {
        const res = await fetch("/api/reset-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email,
            reset_token: token,
            new_password: password
          })
        });

        const data = await res.json();

        if (!res.ok) {
          resetMessage.textContent = data.error || "Could not reset password.";
          return;
        }

        resetMessage.style.color = "green";
        resetMessage.textContent = "Password reset successful. Redirecting to login...";

        setTimeout(() => {
          window.location.href = "/index.html";
        }, 1500);
      } catch (err) {
        resetMessage.textContent = "Server error while resetting password.";
      }
    });

    backToLoginBtn.addEventListener("click", () => {
      window.location.href = "/index.html";
    });
  </script>
</body>
</html>
