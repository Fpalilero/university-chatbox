<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>University Chatbox</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="page-container">
    <div class="login-card">

      <!-- HEADER WITH LOGO -->
      <header class="login-header-row">

        <div class="brand-container">
          <img src="/logo.png" alt="Rowan Logo" class="brand-logo">

          <h1 class="header">
            Welcome To Rowan University Chatbox
          </h1>
        </div>

        <button type="button" id="themeToggleBtn" class="secondary-btn">
          Dark Mode
        </button>

      </header>

      <!-- LOGIN SECTION -->
      <div id="Login" class="page">

        <form id="loginForm">
          <input type="text" id="email" placeholder="Enter Email" required>
          <input type="password" id="password" placeholder="Enter Password" required>

          <div class="form-buttons">
            <button type="submit" id="loginBtn">Login</button>
            <button type="button" id="registerBtn">Register</button>
          </div>
        </form>

        <p id="loginError" class="error"></p>

        <div class="forgot-buttons">
          <button type="button" id="forgotPasswordBtn">Forgot Password?</button>
        </div>

        <p id="forgotMessage" class="error"></p>

      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById("loginForm");
    const loginError = document.getElementById("loginError");
    const forgotMessage = document.getElementById("forgotMessage");
    const registerBtn = document.getElementById("registerBtn");
    const forgotPasswordBtn = document.getElementById("forgotPasswordBtn");
    const themeToggleBtn = document.getElementById("themeToggleBtn");

    function requireRowanEmail(email) {
      return email.toLowerCase().endsWith("@rowan.edu");
    }

    function applyTheme(theme) {
      if (theme === "dark") {
        document.body.classList.add("dark-mode");
        if (themeToggleBtn) themeToggleBtn.textContent = "Light Mode";
      } else {
        document.body.classList.remove("dark-mode");
        if (themeToggleBtn) themeToggleBtn.textContent = "Dark Mode";
      }

      localStorage.setItem("theme", theme);
    }

    function loadSavedTheme() {
      const savedTheme = localStorage.getItem("theme") || "light";
      applyTheme(savedTheme);
    }

    function toggleTheme() {
      const isDark = document.body.classList.contains("dark-mode");
      applyTheme(isDark ? "light" : "dark");
    }

    if (themeToggleBtn) {
      themeToggleBtn.addEventListener("click", toggleTheme);
    }

    loadSavedTheme();

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      loginError.style.color = "#c62828";
      loginError.textContent = "";
      forgotMessage.textContent = "";

      if (!requireRowanEmail(email)) {
        loginError.textContent = "Please use your @rowan.edu email.";
        return;
      }

      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          loginError.textContent = data.error || "Login failed";
          return;
        }

        localStorage.setItem("access_token", data.access_token);
        localStorage.setItem("user_id", data.user_id);
        localStorage.setItem("username", data.username || email.split("@")[0]);
        localStorage.setItem("theme", data.theme || "light");

        loginError.style.color = "green";
        loginError.textContent = "Login successful!";

        window.location.href = "/chat.html";
      } catch (err) {
        loginError.textContent = "Server error.";
      }
    });

    registerBtn.addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      loginError.style.color = "#c62828";
      loginError.textContent = "";
      forgotMessage.textContent = "";

      if (!email || !password) {
        loginError.textContent = "Enter email and password first.";
        return;
      }

      if (!requireRowanEmail(email)) {
        loginError.textContent = "Registration requires a @rowan.edu email.";
        return;
      }

      const username = email.split("@")[0];

      try {
        const res = await fetch("/api/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          loginError.textContent = data.error || "Registration failed";
          return;
        }

        loginError.style.color = "green";
        loginError.textContent = "Registered! Now login.";
      } catch (err) {
        loginError.textContent = "Server error.";
      }
    });

    forgotPasswordBtn.addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();

      loginError.textContent = "";
      forgotMessage.style.color = "#c62828";
      forgotMessage.textContent = "";

      if (!email) {
        forgotMessage.textContent = "Enter your Rowan email first.";
        return;
      }

      if (!requireRowanEmail(email)) {
        forgotMessage.textContent = "Please use your @rowan.edu email.";
        return;
      }

      try {
        const res = await fetch("/api/forgot-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email })
        });

        const data = await res.json();

        if (!res.ok) {
          forgotMessage.textContent = data.error || "Could not start reset.";
          return;
        }

        if (!data.reset_token) {
          forgotMessage.textContent = "Reset token was not created.";
          return;
        }

        window.location.href =
          `/reset_password.html?email=${encodeURIComponent(email)}&token=${encodeURIComponent(data.reset_token)}`;
      } catch (err) {
        forgotMessage.textContent = "Server error while starting password reset.";
      }
    });
  </script>

</body>
</html>
