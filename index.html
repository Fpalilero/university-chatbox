<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>University Chatbox</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page-container">
  <div class="login-card">
    <header>
      <h1 class="header">Welcome To Rowan University Chatbox</h1>
    </header>

    <div id="Login" class="page">
      <form id="loginForm">

        <input type="text" id="email" placeholder="Enter Email" required>

        <input type="password" id="password" placeholder="Enter Password" required>

        <!-- 🔥 Hidden Password Hint -->
        <p class="password-hint">
          Password must be at least 8 characters and include 1 uppercase letter,
          1 lowercase letter, 1 number, and 1 special character.
        </p>

        <div class="form-buttons">
          <button type="submit">Login</button>
          <button type="button" id="registerBtn">Register</button>
        </div>

      </form>

      <p id="loginError" class="error"></p>

      <div class="forgot-buttons">
        <button type="button">Forgot Username?</button>
        <button type="button">Forgot Password?</button>
      </div>

    </div>
  </div>
</div>

<script>
const form = document.getElementById("loginForm");
const loginError = document.getElementById("loginError");
const registerBtn = document.getElementById("registerBtn");

// 🔥 PASSWORD HINT LOGIC
const passwordInput = document.getElementById("password");
const passwordHint = document.querySelector(".password-hint");

passwordInput.addEventListener("focus", () => {
  passwordHint.style.display = "block";
});

passwordInput.addEventListener("blur", () => {
  if (!passwordInput.value) {
    passwordHint.style.display = "none";
  }
});

// Rowan email check
function requireRowanEmail(email) {
  return email.toLowerCase().endsWith("@rowan.edu");
}

// LOGIN
form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value.trim();
  const password = passwordInput.value;

  loginError.textContent = "";

  if (!requireRowanEmail(email)) {
    loginError.textContent = "Use @rowan.edu email.";
    return;
  }

  try {
    const res = await fetch("/api/login", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({email, password})
    });

    const data = await res.json();

    if (!res.ok) {
      loginError.textContent = data.error || "Login failed";
      return;
    }

    localStorage.setItem("access_token", data.access_token);
    localStorage.setItem("user_id", data.user_id);
    localStorage.setItem("username", data.username);

    window.location.href = "/chat.html";

  } catch {
    loginError.textContent = "Server error.";
  }
});

// REGISTER
registerBtn.addEventListener("click", async () => {
  const email = document.getElementById("email").value.trim();
  const password = passwordInput.value;
  const username = email.split("@")[0];

  loginError.textContent = "";

  if (!email || !password) {
    loginError.textContent = "Enter email and password.";
    return;
  }

  if (!requireRowanEmail(email)) {
    loginError.textContent = "Must be @rowan.edu email.";
    return;
  }

  try {
    const res = await fetch("/api/register", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({username, email, password})
    });

    const data = await res.json();

    if (!res.ok) {
      loginError.textContent = data.error || "Register failed";
      return;
    }

    loginError.style.color = "green";
    loginError.textContent = "Registered! Now login.";

  } catch {
    loginError.textContent = "Server error.";
  }
});
</script>

</body>
</html>
